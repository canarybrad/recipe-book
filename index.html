<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Book</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-title-row">
      <h1>Recipe <span>Book</span></h1>
      <div class="header-actions">
        <button class="icon-btn" id="save-pins-btn" title="Save pins to GitHub" style="display:none;">Save Pins</button>
        <button class="icon-btn icon-btn-subtle" id="settings-btn" title="Settings">&#9881;</button>
      </div>
    </div>
    <div class="search-row">
      <input type="text" class="search-input" placeholder="Search recipes..." id="search">
      <span class="result-count" id="count"></span>
    </div>
  </div>
</header>

<div class="filters" id="filters"></div>
<div class="pinned-section" id="pinned-section" style="display:none;">
  <div class="pinned-header">This Week</div>
  <div class="pinned-grid" id="pinned-grid"></div>
</div>
<div class="grid" id="grid"></div>

<dialog id="modal">
  <div class="modal-header">
    <h2 id="modal-title"></h2>
    <button class="modal-close" id="modal-close">&times;</button>
  </div>
  <div class="modal-tags" id="modal-tags"></div>
  <div class="modal-body" id="modal-body"></div>
</dialog>

<dialog id="settings-modal">
  <div class="modal-header">
    <h2>Settings</h2>
    <button class="modal-close" id="settings-close">&times;</button>
  </div>
  <div class="modal-body">
    <p style="margin-bottom:0.75rem;font-size:0.9rem;color:var(--text-muted);">
      Enter a GitHub Personal Access Token with <strong>repo</strong> scope to save pins directly from this page.
    </p>
    <input type="password" class="search-input" id="pat-input" placeholder="ghp_..." style="width:100%;margin-bottom:0.75rem;">
    <div style="display:flex;gap:0.5rem;">
      <button class="icon-btn" id="pat-save">Save Token</button>
      <button class="icon-btn icon-btn-subtle" id="pat-clear">Clear Token</button>
    </div>
    <p id="pat-status" style="margin-top:0.5rem;font-size:0.85rem;color:var(--text-muted);"></p>
  </div>
</dialog>

<script>
const REPO_OWNER = "canarybrad";
const REPO_NAME = "recipe-book";
const PINNED_PATH = "pinned.json";

let DATA = { recipes: [], filters: {} };
let pinnedIds = [];
let pinnedDirty = false;
let activeFilters = { protein: null, meal: null, method: null };
let searchTerm = "";
let debounceTimer;

// --- Init ---
Promise.all([
  fetch("recipes.json").then(r => r.json()),
  fetch("pinned.json").then(r => r.json()).catch(() => [])
]).then(([data, pinned]) => {
  DATA = data;
  pinnedIds = pinned;
  // Merge with localStorage overrides
  const local = localStorage.getItem("pinnedIds");
  if (local) {
    try { pinnedIds = JSON.parse(local); } catch(e) {}
  }
  renderFilters();
  renderAll();
});

function isPinned(id) { return pinnedIds.includes(id); }

function togglePin(id, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  if (isPinned(id)) {
    pinnedIds = pinnedIds.filter(p => p !== id);
  } else {
    pinnedIds.push(id);
  }
  localStorage.setItem("pinnedIds", JSON.stringify(pinnedIds));
  pinnedDirty = true;
  document.getElementById("save-pins-btn").style.display = getToken() ? "" : "none";
  renderAll();
}

// --- Filters ---
function renderFilters() {
  const el = document.getElementById("filters");
  const groups = [
    { key: "protein", label: "Protein" },
    { key: "meal", label: "Meal Type" },
    { key: "method", label: "Method" },
  ];
  el.innerHTML = groups.map(g => {
    const chips = DATA.filters[g.key].map(v =>
      `<span class="chip" data-group="${g.key}" data-value="${v}">${v}</span>`
    ).join("");
    return `<div class="filter-group">
      <div class="filter-group-label">${g.label}</div>
      <div class="filter-chips">${chips}</div>
    </div>`;
  }).join("");

  el.addEventListener("click", e => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    const group = chip.dataset.group;
    const value = chip.dataset.value;
    if (activeFilters[group] === value) {
      activeFilters[group] = null;
      chip.classList.remove("active");
    } else {
      el.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove("active"));
      activeFilters[group] = value;
      chip.classList.add("active");
    }
    renderAll();
  });
}

// --- Search ---
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchTerm = e.target.value.trim().toLowerCase();
    renderAll();
  }, 150);
});

// --- Grid ---
function getFiltered() {
  return DATA.recipes.filter(r => {
    if (activeFilters.protein && r.protein !== activeFilters.protein) return false;
    if (activeFilters.meal && r.meal !== activeFilters.meal) return false;
    if (activeFilters.method && r.method !== activeFilters.method) return false;
    if (searchTerm && !r.searchText.includes(searchTerm)) return false;
    return true;
  });
}

function getPreviewItems(recipe) {
  const items = [];
  for (const entry of recipe.ingredients) {
    if (typeof entry === "string") {
      items.push(entry);
    } else if (entry.items) {
      for (const it of entry.items) items.push(it);
    }
    if (items.length >= 4) break;
  }
  return items.slice(0, 4);
}

function renderCard(r) {
  const tags = [r.protein, r.meal, r.method].filter(Boolean);
  const preview = getPreviewItems(r);
  const pinned = isPinned(r.id);
  return `<div class="card${pinned ? " card-pinned" : ""}" data-id="${r.id}">
    <div class="card-top-row">
      <div class="card-title">${esc(r.title)}</div>
      <button class="pin-btn${pinned ? " pinned" : ""}" data-pin="${r.id}" title="${pinned ? "Unpin" : "Pin for this week"}">${pinned ? "&#9733;" : "&#9734;"}</button>
    </div>
    <div class="card-tags">${tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
    <ul class="card-preview">${preview.map(i => `<li>${esc(shorten(i))}</li>`).join("")}</ul>
  </div>`;
}

function renderAll() {
  const filtered = getFiltered();
  const pinnedRecipes = filtered.filter(r => isPinned(r.id));
  const unpinnedRecipes = filtered.filter(r => !isPinned(r.id));

  document.getElementById("count").textContent = `${filtered.length} recipe${filtered.length !== 1 ? "s" : ""}`;

  // Pinned section
  const pinnedSection = document.getElementById("pinned-section");
  const pinnedGrid = document.getElementById("pinned-grid");
  if (pinnedRecipes.length > 0) {
    pinnedSection.style.display = "";
    pinnedGrid.innerHTML = pinnedRecipes.map(renderCard).join("");
  } else {
    pinnedSection.style.display = "none";
  }

  // Main grid
  const grid = document.getElementById("grid");
  if (unpinnedRecipes.length === 0 && pinnedRecipes.length === 0) {
    grid.innerHTML = `<div class="empty-state">No recipes found. Try adjusting your search or filters.</div>`;
  } else {
    grid.innerHTML = unpinnedRecipes.map(renderCard).join("");
  }
}

function shorten(s) {
  return s.length > 50 ? s.slice(0, 47) + "..." : s;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// --- Pin click handler (delegated) ---
document.addEventListener("click", e => {
  const pinBtn = e.target.closest(".pin-btn");
  if (pinBtn) {
    togglePin(pinBtn.dataset.pin, e);
    return;
  }
});

// --- Modal ---
document.addEventListener("click", e => {
  const card = e.target.closest(".card");
  if (!card || e.target.closest(".pin-btn")) return;
  const recipe = DATA.recipes.find(r => r.id === card.dataset.id);
  if (!recipe) return;
  openModal(recipe);
});

function openModal(r) {
  document.getElementById("modal-title").textContent = r.title;

  const tags = [r.protein, r.meal, r.method].filter(Boolean);
  document.getElementById("modal-tags").innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");

  let html = "<h3>Ingredients</h3>";
  html += renderIngredients(r.ingredients);
  html += "<h3>Instructions</h3>";
  html += renderInstructions(r.instructions);

  if (r.notes) {
    html += `<div class="notes">${esc(r.notes)}</div>`;
  }

  if (r.sourceUrl) {
    html += `<a class="source-link" href="${esc(r.sourceUrl)}" target="_blank" rel="noopener">Original Recipe &rarr;</a>`;
  }

  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal").showModal();
}

function renderIngredients(ingredients) {
  let html = "";
  for (const item of ingredients) {
    if (typeof item === "string") {
      html += `<ul><li>${esc(item)}</li></ul>`;
    } else if (item.group) {
      html += `<h4>${esc(item.group)}</h4><ul>${item.items.map(i => `<li>${esc(i)}</li>`).join("")}</ul>`;
    }
  }
  html = html.replace(/<\/ul><ul>/g, "");
  return html;
}

function renderInstructions(instructions) {
  if (Array.isArray(instructions) && instructions.length > 0 && typeof instructions[0] === "string") {
    return `<ol>${instructions.map(s => `<li>${esc(s)}</li>`).join("")}</ol>`;
  }
  let html = "";
  for (const group of instructions) {
    html += `<h4>${esc(group.group)}</h4><ol>${group.steps.map(s => `<li>${esc(s)}</li>`).join("")}</ol>`;
  }
  return html;
}

document.getElementById("modal-close").addEventListener("click", () => {
  document.getElementById("modal").close();
});

document.getElementById("modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) e.currentTarget.close();
});

// --- Settings modal ---
document.getElementById("settings-btn").addEventListener("click", () => {
  const pat = getToken();
  document.getElementById("pat-input").value = pat ? "********" : "";
  document.getElementById("pat-status").textContent = pat ? "Token is saved." : "";
  document.getElementById("settings-modal").showModal();
});

document.getElementById("settings-close").addEventListener("click", () => {
  document.getElementById("settings-modal").close();
});

document.getElementById("settings-modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) e.currentTarget.close();
});

document.getElementById("pat-save").addEventListener("click", () => {
  const val = document.getElementById("pat-input").value.trim();
  if (val && !val.startsWith("*")) {
    localStorage.setItem("gh_pat", val);
    document.getElementById("pat-status").textContent = "Token saved.";
    document.getElementById("save-pins-btn").style.display = pinnedDirty ? "" : "none";
  }
});

document.getElementById("pat-clear").addEventListener("click", () => {
  localStorage.removeItem("gh_pat");
  document.getElementById("pat-input").value = "";
  document.getElementById("pat-status").textContent = "Token cleared.";
  document.getElementById("save-pins-btn").style.display = "none";
});

function getToken() {
  return localStorage.getItem("gh_pat") || "";
}

// --- Save pins to GitHub ---
document.getElementById("save-pins-btn").addEventListener("click", async () => {
  const btn = document.getElementById("save-pins-btn");
  const token = getToken();
  if (!token) {
    document.getElementById("settings-modal").showModal();
    return;
  }

  btn.textContent = "Saving...";
  btn.disabled = true;

  try {
    // Get current file SHA
    const getResp = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PINNED_PATH}`, {
      headers: { "Authorization": `token ${token}` }
    });
    let sha = null;
    if (getResp.ok) {
      const file = await getResp.json();
      sha = file.sha;
    }

    // Commit updated pinned.json
    const body = {
      message: "Update pinned recipes",
      content: btoa(JSON.stringify(pinnedIds, null, 2) + "\n"),
    };
    if (sha) body.sha = sha;

    const putResp = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PINNED_PATH}`, {
      method: "PUT",
      headers: {
        "Authorization": `token ${token}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify(body),
    });

    if (putResp.ok) {
      pinnedDirty = false;
      btn.textContent = "Saved!";
      setTimeout(() => {
        btn.textContent = "Save Pins";
        btn.style.display = "none";
      }, 2000);
    } else {
      const err = await putResp.json();
      btn.textContent = "Error";
      console.error("GitHub API error:", err);
      setTimeout(() => { btn.textContent = "Save Pins"; }, 3000);
    }
  } catch (e) {
    btn.textContent = "Error";
    console.error("Save failed:", e);
    setTimeout(() => { btn.textContent = "Save Pins"; }, 3000);
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
